<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Player</title>
    <style>
        :root { --primary: #0ea5e9; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:white; font-family:system-ui, sans-serif; overflow:hidden; }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.15rem;
        }

        /* Bottom Controls */
        .bottom-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 15px 20px 25px;
            z-index: 100;
        }

        .progress-bar {
            height: 5px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .progress-filled {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            width: 0%;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            background: rgba(255,255,255,0.18);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .btn:hover { background: rgba(255,255,255,0.35); }

        .play-pause-btn {
            width: 54px;
            height: 54px;
            font-size: 1.6rem;
        }

        .time {
            font-size: 0.95rem;
            min-width: 110px;
            font-weight: 500;
        }

        /* Center Play Button */
        .center-play {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85px; height: 85px;
            background: rgba(0,0,0,0.75);
            border: 3px solid white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 60;
        }

        .center-play.show { display: flex; }

        .center-play svg {
            width: 38px; height: 38px; margin-left: 5px;
        }

        /* Loading */
        .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 70;
        }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Double tap feedback */
        .tap-feedback {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
            z-index: 80;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <video id="video" preload="metadata"></video>

        <!-- Center Play Button -->
        <div class="center-play" id="centerPlay">
            <svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21"/></svg>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading"></div>

        <!-- Tap Feedback -->
        <div class="tap-feedback" id="tapFeedback"></div>

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="brand">
                ⚡ <span>Fast Player</span>
                <span style="background:#22c55e; color:#000; padding:3px 10px; border-radius:9999px; font-size:0.75rem; font-weight:700;">OPTIMIZED</span>
            </div>
            <select id="qualitySelector" style="background:rgba(255,255,255,0.15); border:none; color:white; padding:8px 14px; border-radius:8px;">
                <option value="auto">Auto Quality</option>
            </select>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-controls">
            <div class="progress-bar" id="progressBar">
                <div class="progress-filled" id="progressFilled"></div>
            </div>

            <div class="controls-row">
                <button class="btn play-pause-btn" id="playPauseBtn">▶</button>
                
                <div class="time" id="timeDisplay">0:00 / 0:00</div>

                <div style="flex: 1;"></div>

                <button class="btn" id="speedBtn">1x</button>
                <button class="btn" id="pipBtn">📺</button>
                <!-- Prominent Fullscreen Button -->
                <button class="btn" id="fullscreenBtn" title="Fullscreen" style="font-size:1.6rem;">⛶</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        if (videoUrl) video.src = videoUrl;

        const playPauseBtn = document.getElementById('playPauseBtn');
        const centerPlay = document.getElementById('centerPlay');
        const progressBar = document.getElementById('progressBar');
        const progressFilled = document.getElementById('progressFilled');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speedBtn = document.getElementById('speedBtn');
        const loading = document.getElementById('loading');
        const tapFeedback = document.getElementById('tapFeedback');

        let isPlaying = false;
        let speeds = [0.5, 1, 1.25, 1.5, 2];
        let currentSpeedIndex = 1;
        let lastTapTime = 0;
        let tapCount = 0;

        // Toggle Play/Pause
        function togglePlay() {
            if (video.paused) {
                video.play();
                isPlaying = true;
                playPauseBtn.innerHTML = '❚❚';
                centerPlay.classList.remove('show');
            } else {
                video.pause();
                isPlaying = false;
                playPauseBtn.innerHTML = '▶';
                centerPlay.classList.add('show');
            }
        }

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.getElementById('container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Speed Control
        speedBtn.addEventListener('click', () => {
            currentSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
            video.playbackRate = speeds[currentSpeedIndex];
            speedBtn.textContent = speeds[currentSpeedIndex] + 'x';
        });

        // Progress Bar
        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                progressFilled.style.width = percent + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Single Tap - Play/Pause
        video.addEventListener('click', togglePlay);
        playPauseBtn.addEventListener('click', togglePlay);
        centerPlay.addEventListener('click', togglePlay);

        // Double Tap for Seek (Left = -10s, Right = +10s)
        function handleTap(e) {
            const now = Date.now();
            const rect = video.getBoundingClientRect();
            const tapX = e.clientX - rect.left;
            const isRightSide = tapX > rect.width / 2;

            if (now - lastTapTime < 300) {
                tapCount++;
                if (tapCount === 2) {
                    const seekAmount = isRightSide ? 10 : -10;
                    video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seekAmount));
                    
                    // Show feedback
                    tapFeedback.textContent = seekAmount > 0 ? `+${seekAmount}s` : `${seekAmount}s`;
                    tapFeedback.style.left = isRightSide ? '70%' : '30%';
                    tapFeedback.style.opacity = '1';
                    setTimeout(() => tapFeedback.style.opacity = '0', 800);
                    
                    tapCount = 0;
                }
            } else {
                tapCount = 1;
            }
            lastTapTime = now;
        }

        video.addEventListener('click', handleTap);

        // Loading Indicator
        video.addEventListener('waiting', () => loading.style.display = 'block');
        video.addEventListener('playing', () => loading.style.display = 'none');

        // Keyboard Support
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if (e.code === 'KeyF') { e.preventDefault(); fullscreenBtn.click(); }
        });

        // Show center play when paused
        video.addEventListener('pause', () => centerPlay.classList.add('show'));
        video.addEventListener('play', () => centerPlay.classList.remove('show'));

        // Load video
        video.load();
        centerPlay.classList.add('show');
    </script>
</body>
</html>
